<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silence Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #161616;
      --surface:  #202020;
      --surface2: #272727;
      --border:   #333;
      --text:     #e8e8e8;
      --text-dim: #888;
      --black:    #111;
      --white:    #f0f0f0;
      --green:    #4caf50;
      --yellow:   #f0c040;
      --red:      #e05050;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    header {
      text-align: center;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.95rem; font-weight: 700; color: var(--white); letter-spacing: .01em; }
    header p  { margin-top: .3rem; font-size: .85rem; color: var(--text-dim); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.3rem 1.6rem 1.6rem 1.5rem;
      transition: border-color .4s, box-shadow .4s;
    }
    .card.glow-green  { border-color: rgba(76,175,80,.45);  box-shadow: 0 0 18px rgba(76,175,80,.08); }
    .card.glow-yellow { border-color: rgba(240,192,64,.45); box-shadow: 0 0 18px rgba(240,192,64,.08); }
    .card.glow-red    { border-color: rgba(224,80,80,.45);  box-shadow: 0 0 18px rgba(224,80,80,.12); }

    .card-title {
      font-size: .68rem; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem;
    }

    .timer-wrap { text-align: center; }
    .timer {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 500; color: var(--white);
      letter-spacing: .03em; transition: color .2s; line-height: 1;
    }
    .timer.lost { color: var(--red); animation: shake .35s ease; }
    .timer-sub  { font-size: .68rem; color: var(--text-dim); margin-top: .4rem; letter-spacing: .1em; text-transform: uppercase; }

    .status-msg {
      text-align: center; font-size: .9rem; font-weight: 500;
      min-height: 1.5em; margin-top: .75rem; color: var(--text-dim); transition: color .2s;
    }
    .status-msg.running { color: var(--green); }
    .status-msg.paused  { color: var(--yellow); }
    .status-msg.lost    { color: var(--red); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    .dot { display: inline-block; animation: blink 1.4s ease-in-out infinite; }

    .db-row { display: flex; align-items: center; gap: 1.25rem; }
    .db-number {
      font-family: 'DM Mono', monospace; font-size: 2.2rem;
      font-weight: 500; min-width: 6ch; color: var(--white); transition: color .1s;
    }
    .db-number.warn   { color: var(--yellow); }
    .db-number.danger { color: var(--red); }

    .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: .4rem; }
    .bar-track {
      height: 16px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 99px;
      overflow: hidden; position: relative;
    }
    .bar-track::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 9px,
        var(--bg) 9px, var(--bg) 11px
      );
      pointer-events: none; z-index: 2;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: var(--green); border-radius: 99px;
      transition: width .04s linear, background .1s;
    }
    .limit-marker {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: rgba(255,255,255,.45); pointer-events: none; z-index: 3;
    }
    .bar-labels { display: flex; justify-content: space-between; font-size: .65rem; color: var(--text-dim); }

    .calib-row {
      display: flex; align-items: center; gap: .6rem;
      margin-top: .7rem; font-size: .75rem; color: var(--text-dim);
    }
    .calib-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      flex-shrink: 0; transition: background .2s;
    }
    .calib-dot.active { background: var(--yellow); box-shadow: 0 0 5px rgba(240,192,64,.5); }
    .calib-dot.done   { background: var(--green);  box-shadow: 0 0 5px rgba(76,175,80,.4); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    .limit-row { display: flex; align-items: center; gap: .9rem; flex-wrap: wrap; }
    .limit-row label {
      font-size: .73rem; font-weight: 500; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
    }
    input[type=range]  { flex: 1; min-width: 100px; accent-color: var(--white); cursor: pointer; }
    input[type=number] {
      width: 5rem; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--white); font-family: 'DM Mono', monospace;
      font-size: .95rem; padding: .3rem .5rem; text-align: center; outline: none;
    }
    input[type=number]:focus { border-color: #666; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0; }
    .db-unit { font-size: .8rem; color: var(--text-dim); }

    .btn-row { display: flex; gap: .75rem; }
    .btn {
      flex: 1; font-family: 'DM Sans', sans-serif; font-size: .88rem;
      font-weight: 600; border-radius: 5px; padding: .8rem 1rem .9rem;
      cursor: pointer; border: none; transition: background .15s, transform .1s, opacity .2s;
    }
    .btn:active   { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .btn-start { background: var(--white); color: var(--black); }
    .btn-start:hover:not(:disabled) { background: #d8d8d8; }

    .btn-pause { background: #1e3a50; color: #7eb8d8; border: 1px solid #2d5570; }
    .btn-pause:hover:not(:disabled) { background: #274d6a; }

    .btn-reset { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-reset:hover:not(:disabled) { background: #3a3a3a; }

    .footer-row {
      display: flex; justify-content: space-between;
      font-size: .75rem; color: var(--text-dim);
    }
    .best-time-val { font-family: 'DM Mono', monospace; color: var(--text); }

    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      25%    { transform:translateX(-7px) }
      75%    { transform:translateX( 7px) }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>SEIT LEISE !</h1>
    <p>Wie lange bleiben wir still?</p>
  </header>

  <div class="card" id="timerCard">
    <div class="card-title">Timer</div>
    <div class="timer-wrap">
      <div class="timer" id="timer">00:00.000</div>
      <div class="timer-sub">min : sek . ms</div>
    </div>
    <div class="status-msg" id="statusMsg">Bereit zum Starten</div>
  </div>

  <div class="card">
    <div class="card-title">Lautstärke</div>

    <div class="db-row">
      <div class="db-number" id="dbValue">— dB</div>
      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
          <div class="limit-marker" id="limitMarker"></div>
        </div>
        <div class="bar-labels"><span>0 dB</span><span id="barMax">100 dB</span></div>
      </div>
    </div>

    <div class="calib-row">
      <div class="calib-dot" id="calibDot"></div>
      <span id="calibStatus">Mikrofon nicht aktiv – Kalibrierung startet mit dem Start</span>
    </div>

    <div class="divider"></div>

    <div class="limit-row">
      <label>Dezibel-Limit</label>
      <input type="range" id="limitSlider" min="20" max="100" value="50" step="1" />
      <input type="number" id="limitInput" min="20" max="100" value="50" />
      <span class="db-unit">dB</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="startBtn">▶  Start</button>
    <button class="btn btn-pause" id="pauseBtn" disabled>⏸  Pause</button>
    <button class="btn btn-reset" id="resetBtn">↺  Reset</button>
  </div>

  <div class="footer-row">
    <span>Bestzeit: <span class="best-time-val" id="bestTimeVal">–</span></span>
    <span>Mikrofon · Web Audio API</span>
  </div>

</div>

<script>
  const timerEl     = document.getElementById('timer');
  const timerCard   = document.getElementById('timerCard');
  const statusMsg   = document.getElementById('statusMsg');
  const dbValue     = document.getElementById('dbValue');
  const barFill     = document.getElementById('barFill');
  const limitMarker = document.getElementById('limitMarker');
  const limitSlider = document.getElementById('limitSlider');
  const limitInput  = document.getElementById('limitInput');
  const calibDot    = document.getElementById('calibDot');
  const calibStatus = document.getElementById('calibStatus');
  const barMax      = document.getElementById('barMax');
  const startBtn    = document.getElementById('startBtn');
  const pauseBtn    = document.getElementById('pauseBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const bestTimeVal = document.getElementById('bestTimeVal');

  let running     = false;
  let paused      = false;
  let startTime   = null;
  let pausedAt    = null;
  let totalPaused = 0;
  let animFrame   = null;
  let rafMic      = null;
  let bestTime    = null;
  let dbLimit     = 50;

  let audioCtx    = null;
  let analyser    = null;
  let micStream   = null;
  let dataArray   = null;
  let freqArray   = null;

  const SAMPLE_RATE_DEFAULT = 48000;
  let   sampleRate          = SAMPLE_RATE_DEFAULT;

  function aWeight(f) {
    if (f < 10) return 0;
    const f2  = f * f;
    const f4  = f2 * f2;
    const num = 148840000 * f4;
    const den = (f2 + 424.36) * Math.sqrt((f2 + 11599.29) * (f2 + 544496.41)) * (f2 + 148840000);
    return num / den;
  }

  const CALIB_FRAMES   = 60;
  let   calibBuffer    = [];
  let   calibrated     = false;
  let   noiseFloor     = -Infinity; 
  const NOISE_MARGIN   = 6; 

  const SMOOTH_FAST    = 0.25; 
  const SMOOTH_SLOW    = 0.05; 
  let   smoothedDb     = 0;
  let   peakDb         = 0;
  let   peakHoldFrames = 0;
  const PEAK_HOLD      = 30;    

  const TRIGGER_FRAMES = 3;   
  let   triggerCount   = 0;

  function computeWeightedDb() {
    analyser.getFloatFrequencyData(freqArray);

    const binCount  = analyser.frequencyBinCount;
    const binWidth  = sampleRate / (binCount * 2);

    let weightedPower = 0;
    let totalWeight   = 0;

    for (let i = 1; i < binCount; i++) {
      const freq = i * binWidth;
      if (freq > 20000) break;

      const linearAmp = Math.pow(10, freqArray[i] / 20);
      const power     = linearAmp * linearAmp;
      const w         = aWeight(freq);

      weightedPower += power * w;
      totalWeight   += w;
    }

    if (totalWeight === 0 || weightedPower <= 0) return -Infinity;

    const rmsWeighted = Math.sqrt(weightedPower / totalWeight);
    return 20 * Math.log10(rmsWeighted) + 90; 
  }

  function runCalibration(dbVal) {
    if (calibrated) return;

    calibBuffer.push(dbVal);
    const progress = Math.min(100, Math.round((calibBuffer.length / CALIB_FRAMES) * 100));
    calibDot.className = 'calib-dot active';
    calibStatus.textContent = `Kalibrierung … ${progress}%`;

    if (calibBuffer.length >= CALIB_FRAMES) {
      const sorted   = [...calibBuffer].sort((a, b) => a - b);
      noiseFloor     = sorted[Math.floor(sorted.length * 0.85)];
      calibrated     = true;
      calibDot.className = 'calib-dot done';
      calibStatus.textContent = `Kalibriert – Rauschen: ${noiseFloor.toFixed(1)} dB`;
    }
  }

  function updateMarker() {
    const maxDb = 100;
    limitMarker.style.left = Math.min(100, (dbLimit / maxDb) * 100) + '%';
  }

  limitSlider.addEventListener('input', () => {
    dbLimit = parseInt(limitSlider.value);
    limitInput.value = dbLimit;
    updateMarker();
  });
  limitInput.addEventListener('input', () => {
    const v = Math.min(100, Math.max(20, parseInt(limitInput.value) || 50));
    dbLimit = v; limitSlider.value = v;
    updateMarker();
  });
  updateMarker();

  function formatTime(ms) {
    const s   = Math.floor(ms / 1000);
    const min = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    const ms3 = String(ms % 1000).padStart(3, '0');
    return `${min}:${sec}.${ms3}`;
  }

  function setCardGlow(state) {
    timerCard.className = 'card' + (state ? ' glow-' + state : '');
  }

  function timerLoop() {
    if (!running || paused) return;
    timerEl.textContent = formatTime(Math.floor(performance.now() - startTime - totalPaused));
    animFrame = requestAnimationFrame(timerLoop);
  }

  function micLoop() {
    if (!analyser) return;
    rafMic = requestAnimationFrame(micLoop);

    const rawDb = computeWeightedDb();

    if (!calibrated) {
      runCalibration(rawDb);
    }

    if (rawDb > -Infinity) {
      smoothedDb = smoothedDb === 0
        ? rawDb
        : smoothedDb + SMOOTH_FAST * (rawDb - smoothedDb);
    }

    if (smoothedDb > peakDb) {
      peakDb = smoothedDb;
      peakHoldFrames = PEAK_HOLD;
    } else {
      if (peakHoldFrames > 0) {
        peakHoldFrames--;
      } else {
        peakDb += SMOOTH_SLOW * (smoothedDb - peakDb);
      }
    }

    const displayDb = Math.max(0, smoothedDb);
    const maxDb     = 100;

    dbValue.textContent = displayDb.toFixed(1) + ' dB';

    const ratio = displayDb / dbLimit;
    dbValue.className = 'db-number' + (ratio >= 0.92 ? ' danger' : ratio >= 0.70 ? ' warn' : '');

    barFill.style.width      = Math.min(100, (displayDb / maxDb) * 100) + '%';
    barFill.style.background = ratio >= 0.92 ? 'var(--red)'
                             : ratio >= 0.70 ? 'var(--yellow)'
                             : 'var(--green)';

    if (running && !paused && calibrated) {
      const overLimit      = displayDb > dbLimit;
      const overNoiseFloor = displayDb > noiseFloor + NOISE_MARGIN;

      if (overLimit && overNoiseFloor) {
        triggerCount++;
        if (triggerCount >= TRIGGER_FRAMES) {
          stopChallenge(false);
        }
      } else {
        triggerCount = 0;
      }
    }
  }

  async function startChallenge() {
    if (running) return;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation:   false, 
          noiseSuppression:   false, 
          autoGainControl:    false,  
          sampleRate:         48000, 
          channelCount:       1,
          latency:            0, 
        }
      });
    } catch {
      statusMsg.textContent = 'Mikrofon-Zugriff verweigert.';
      statusMsg.className = 'status-msg lost';
      return;
    }

    audioCtx  = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    sampleRate = audioCtx.sampleRate;

    analyser             = audioCtx.createAnalyser();
    analyser.fftSize     = 8192;  
    analyser.smoothingTimeConstant = 0.0;
    analyser.minDecibels = -100;
    analyser.maxDecibels = 0;

    dataArray = new Float32Array(analyser.fftSize);
    freqArray = new Float32Array(analyser.frequencyBinCount);

    audioCtx.createMediaStreamSource(micStream).connect(analyser);

    calibBuffer = []; calibrated = false; triggerCount = 0;
    smoothedDb = 0; peakDb = 0; peakHoldFrames = 0;
    calibDot.className = 'calib-dot active';
    calibStatus.textContent = 'Kalibrierung startet …';

    running = true; paused = false;
    startTime = performance.now(); totalPaused = 0;

    timerEl.className = 'timer';
    statusMsg.innerHTML = '<span class="dot">●</span> Stille bitte …';
    statusMsg.className = 'status-msg running';
    setCardGlow('green');

    startBtn.disabled = true;
    pauseBtn.disabled = false;
    limitSlider.disabled = limitInput.disabled = true;

    timerLoop();
    micLoop();
  }

  function togglePause() {
    if (!running) return;

    if (!paused) {
      paused = true;
      pausedAt = performance.now();
      cancelAnimationFrame(animFrame);
      triggerCount = 0;

      statusMsg.innerHTML = '⏸ Pausiert';
      statusMsg.className = 'status-msg paused';
      setCardGlow('yellow');
      pauseBtn.textContent = '▶  Weiter';
    } else {
      totalPaused += performance.now() - pausedAt;
      paused = false; pausedAt = null;
      triggerCount = 0;
      calibBuffer = []; calibrated = false;
      calibDot.className = 'calib-dot active';
      calibStatus.textContent = 'Neu-Kalibrierung …';

      statusMsg.innerHTML = '<span class="dot">●</span> Stille bitte …';
      statusMsg.className = 'status-msg running';
      setCardGlow('green');
      pauseBtn.textContent = '⏸  Pause';
      timerLoop();
    }
  }

  function stopChallenge(manual = false) {
    if (!running) return;
    running = false; paused = false;
    cancelAnimationFrame(animFrame);
    cancelAnimationFrame(rafMic);

    const elapsed   = Math.floor(performance.now() - startTime - totalPaused);
    const isNewBest = bestTime === null || elapsed > bestTime;
    timerEl.textContent = formatTime(elapsed);

    if (manual) {
      statusMsg.textContent = 'Gestoppt.';
      statusMsg.className   = 'status-msg';
      setCardGlow(null);
    } else {
      timerEl.className     = 'timer lost';
      statusMsg.textContent = 'Zu laut – Challenge verloren!';
      statusMsg.className   = 'status-msg lost';
      setCardGlow('red');
      if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
    }

    if (isNewBest && elapsed > 500) {
      bestTime = elapsed;
      bestTimeVal.textContent = formatTime(bestTime);
    }

    startBtn.disabled = false;
    startBtn.textContent = '▶  Nochmal';
    pauseBtn.disabled = true;
    pauseBtn.textContent = '⏸  Pause';
    limitSlider.disabled = limitInput.disabled = false;
  }

  function resetChallenge() {
    if (running) stopChallenge(true);
    cancelAnimationFrame(rafMic);
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close().catch(()=>{}); audioCtx = null; }
    analyser = null; running = false; paused = false; totalPaused = 0;
    calibBuffer = []; calibrated = false; triggerCount = 0;
    smoothedDb = 0; peakDb = 0;

    timerEl.textContent    = '00:00.000';
    timerEl.className      = 'timer';
    statusMsg.textContent  = 'Bereit zum Starten';
    statusMsg.className    = 'status-msg';
    dbValue.textContent    = '— dB';
    dbValue.className      = 'db-number';
    barFill.style.width    = '0%';
    barFill.style.background = 'var(--green)';
    calibDot.className     = 'calib-dot';
    calibStatus.textContent = 'Mikrofon nicht aktiv – Kalibrierung startet mit dem Start';
    setCardGlow(null);

    startBtn.disabled = false;
    startBtn.textContent = '▶  Start';
    pauseBtn.disabled = true;
    pauseBtn.textContent = '⏸  Pause';
    limitSlider.disabled = limitInput.disabled = false;
  }

  startBtn.addEventListener('click', () => { if (!running) startChallenge(); });
  pauseBtn.addEventListener('click', togglePause);
  resetBtn.addEventListener('click', resetChallenge);
</script>
</body>
</html>
