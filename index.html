<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silence Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #161616;
      --surface:  #202020;
      --surface2: #272727;
      --border:   #333;
      --text:     #e8e8e8;
      --text-dim: #888;
      --black:    #111;
      --white:    #f0f0f0;
      --green:    #4caf50;
      --yellow:   #f0c040;
      --red:      #e05050;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    header {
      text-align: center;
      padding-bottom: .5rem;
      padding-top: .2rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.95rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: .01em;
    }
    header p {
      margin-top: .3rem;
      font-size: .85rem;
      color: var(--text-dim);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.3rem 1.6rem 1.6rem 1.5rem;
    }
    .card-title {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .timer-wrap { text-align: center; }
    .timer {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 500;
      color: var(--white);
      letter-spacing: .03em;
      transition: color .2s;
      line-height: 1;
    }
    .timer.lost {
      color: var(--red);
      animation: shake .35s ease;
    }
    .timer-sub {
      font-size: .68rem;
      color: var(--text-dim);
      margin-top: .4rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .status-msg {
      text-align: center;
      font-size: .9rem;
      font-weight: 500;
      min-height: 1.5em;
      margin-top: .75rem;
      color: var(--text-dim);
      transition: color .2s;
    }
    .status-msg.running { color: var(--green); }
    .status-msg.lost    { color: var(--red); }

    .db-row {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .db-number {
      font-family: 'DM Mono', monospace;
      font-size: 2.2rem;
      font-weight: 500;
      min-width: 5.5ch;
      color: var(--white);
      transition: color .15s;
    }
    .db-number.warn   { color: var(--yellow); }
    .db-number.danger { color: var(--red); }

    .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: .4rem; }
    .bar-track {
      height: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 99px;
      transition: width .08s linear, background .2s;
    }
    .limit-marker {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: rgba(255,255,255,.3);
      pointer-events: none;
      z-index: 2;
    }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: .65rem;
      color: var(--text-dim);
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .limit-row {
      display: flex;
      align-items: center;
      gap: .9rem;
      flex-wrap: wrap;
    }
    .limit-row label {
      font-size: .73rem;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    input[type=range] {
      flex: 1;
      min-width: 100px;
      accent-color: var(--white);
      cursor: pointer;
    }
    input[type=number] {
      width: 5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: .95rem;
      padding: .3rem .5rem;
      text-align: center;
      outline: none;
    }
    input[type=number]:focus { border-color: #666; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0; }
    .db-unit { font-size: .8rem; color: var(--text-dim); }

    .btn-row { display: flex; gap: .75rem; }
    .btn {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      border-radius: 5px;
      padding: .8rem 1.5rem .9rem;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s, opacity .2s;
    }
    .btn:active  { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-start {
      background: var(--white);
      color: var(--black);
    }
    .btn-start:hover:not(:disabled) { background: #d8d8d8; }
    .btn-reset {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-reset:hover:not(:disabled) { background: #3a3a3a; }

    .footer-row {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--text-dim);
    }
    .best-time-val {
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      25%    { transform:translateX(-7px) }
      75%    { transform:translateX( 7px) }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>SEIT LEISE !</h1>
    <p>Wie lange bleiben wir still?</p>
  </header>

  <div class="card">
    <div class="card-title">Timer</div>
    <div class="timer-wrap">
      <div class="timer" id="timer">00:00.000</div>
      <div class="timer-sub">min : sek . ms</div>
    </div>
    <div class="status-msg idle" id="statusMsg">Bereit zum Starten</div>
  </div>

  <div class="card">
    <div class="card-title">Lautstärke</div>
    <div class="db-row">
      <div class="db-number" id="dbValue">— dB</div>
      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
          <div class="limit-marker" id="limitMarker"></div>
        </div>
        <div class="bar-labels"><span>0 dB</span><span>150 dB</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="limit-row">
      <label>Dezibel-Limit</label>
      <input type="range" id="limitSlider" min="20" max="200" value="150" step="1" />
      <input type="number" id="limitInput" min="20" max="200" value="150" />
      <span class="db-unit">dB</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="startBtn">▶  Start</button>
    <button class="btn btn-reset" id="resetBtn">↺  Reset</button>
  </div>

  <div class="footer-row">
    <span>Bestzeit: <span class="best-time-val" id="bestTimeVal">–</span></span>
    <span>Mikrofon · Web Audio API</span>
  </div>

</div>

<script>
  const timerEl     = document.getElementById('timer');
  const statusMsg   = document.getElementById('statusMsg');
  const dbValue     = document.getElementById('dbValue');
  const barFill     = document.getElementById('barFill');
  const limitMarker = document.getElementById('limitMarker');
  const limitSlider = document.getElementById('limitSlider');
  const limitInput  = document.getElementById('limitInput');
  const startBtn    = document.getElementById('startBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const bestTimeVal = document.getElementById('bestTimeVal');

  let running   = false;
  let startTime = null;
  let animFrame = null;
  let rafMic    = null;
  let bestTime  = null;
  let dbLimit   = 150;
  let audioCtx  = null;
  let analyser  = null;
  let micStream = null;
  let dataArray = null;

  function formatTime(ms) {
    const s   = Math.floor(ms / 1000);
    const min = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    const ms3 = String(ms % 1000).padStart(3, '0');
    return `${min}:${sec}.${ms3}`;
  }

  function rmsToDb(rms) {
    if (rms < 1e-9) return 0;
    return Math.max(0, 20 * Math.log10(rms) + 90);
  }

  function updateLimitMarker(limit) {
    limitMarker.style.left = Math.min(100, (limit / 150) * 100) + '%';
  }

  limitSlider.addEventListener('input', () => {
    dbLimit = parseInt(limitSlider.value);
    limitInput.value = dbLimit;
    updateLimitMarker(dbLimit);
  });
  limitInput.addEventListener('input', () => {
    const v = Math.min(200, Math.max(20, parseInt(limitInput.value) || 150));
    dbLimit = v;
    limitSlider.value = v;
    updateLimitMarker(dbLimit);
  });
  updateLimitMarker(dbLimit);

  function timerLoop() {
    if (!running) return;
    timerEl.textContent = formatTime(Math.floor(performance.now() - startTime));
    animFrame = requestAnimationFrame(timerLoop);
  }

  function micLoop() {
    if (!analyser) return;
    rafMic = requestAnimationFrame(micLoop);

    analyser.getFloatTimeDomainData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] ** 2;
    const db = rmsToDb(Math.sqrt(sum / dataArray.length));

    dbValue.textContent = db.toFixed(1) + ' dB';
    const ratio = db / dbLimit;
    dbValue.className = 'db-number' + (ratio >= 0.9 ? ' danger' : ratio >= 0.65 ? ' warn' : '');

    barFill.style.width = Math.min(100, (db / 150) * 100) + '%';
    barFill.style.background = ratio >= 0.9 ? 'var(--red)' : ratio >= 0.65 ? 'var(--yellow)' : 'var(--green)';

    if (running && db > dbLimit) stopChallenge(false);
  }

  async function startChallenge() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      statusMsg.textContent = 'Mikrofon-Zugriff verweigert.';
      statusMsg.className = 'status-msg lost';
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    dataArray = new Float32Array(analyser.fftSize);
    audioCtx.createMediaStreamSource(micStream).connect(analyser);

    running   = true;
    startTime = performance.now();
    timerEl.className = 'timer';
    statusMsg.textContent = '● Stille bitte …';
    statusMsg.className = 'status-msg running';
    startBtn.disabled = limitSlider.disabled = limitInput.disabled = true;

    timerLoop();
    micLoop();
  }

  function stopChallenge(manual = false) {
    if (!running) return;
    running = false;
    cancelAnimationFrame(animFrame);
    cancelAnimationFrame(rafMic);

    const elapsed = Math.floor(performance.now() - startTime);
    timerEl.textContent = formatTime(elapsed);

    if (manual) {
      statusMsg.textContent = 'Gestoppt nach ' + (elapsed / 1000).toFixed(2) + 's';
      statusMsg.className = 'status-msg idle';
    } else {
      timerEl.className = 'timer lost';
      statusMsg.textContent = 'Zu laut! Challenge verloren.';
      statusMsg.className = 'status-msg lost';
    }

    if (bestTime === null || elapsed > bestTime) {
      bestTime = elapsed;
      bestTimeVal.textContent = formatTime(bestTime);
    }

    startBtn.disabled = limitSlider.disabled = limitInput.disabled = false;
    startBtn.textContent = '▶  Nochmal';
  }

  function resetChallenge() {
    if (running) stopChallenge(true);
    cancelAnimationFrame(rafMic);
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
    analyser = null;

    running = false;
    timerEl.textContent  = '00:00.000';
    timerEl.className    = 'timer';
    statusMsg.textContent = 'Bereit zum Starten';
    statusMsg.className  = 'status-msg idle';
    dbValue.textContent  = '— dB';
    dbValue.className    = 'db-number';
    barFill.style.width  = '0%';
    barFill.style.background = 'var(--green)';
    startBtn.disabled = limitSlider.disabled = limitInput.disabled = false;
    startBtn.textContent = '▶  Start';
  }

  startBtn.addEventListener('click', () => { if (!running) startChallenge(); });
  resetBtn.addEventListener('click', resetChallenge);
</script>
</body>
</html>
